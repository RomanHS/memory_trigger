publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  csv: ^7.1.0
  flutter:
    sdk: flutter
  http: ^1.6.0
  provider: ^6.1.5+1

dev_dependencies:
